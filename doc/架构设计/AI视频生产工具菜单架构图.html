<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 视频生产工具菜单架构图</title>
  <style>
    :root {
      --bg: #151515;
      --panel: #1d1d1d;
      --panel-2: #252525;
      --node: #343434;
      --node-active: #4a4030;
      --line: #3e3e3e;
      --text: #eeeeee;
      --muted: #a8a8a8;
      --gold: #d8ad68;
      --green: #72c9aa;
      --blue: #83a8ff;
      --red: #f07c7c;
      --violet: #b79cff;
      --font: "Microsoft YaHei", "PingFang SC", "Noto Sans SC", sans-serif;
      --mono: Consolas, "Courier New", monospace;
    }

    * { box-sizing: border-box; scrollbar-width: thin; scrollbar-color: #6a5b44 #181818; }
    *::-webkit-scrollbar { width: 9px; height: 9px; }
    *::-webkit-scrollbar-track { background: #181818; border: 1px solid #222; }
    *::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #6a5b44, #3f3a32); border: 2px solid #181818; }
    *::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #d8ad68, #6a5b44); }

    html, body { height: 100%; }
    body {
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(90deg, rgba(255,255,255,.026) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,255,255,.026) 1px, transparent 1px),
        radial-gradient(circle at 20% -10%, rgba(216,173,104,.12), transparent 30%),
        var(--bg);
      background-size: 34px 34px, 34px 34px, auto, auto;
      font-family: var(--font);
      overflow: hidden;
      letter-spacing: 0;
    }

    button, input { font: inherit; }
    button { cursor: pointer; }

    .app {
      display: grid;
      grid-template-rows: 58px 1fr;
      height: 100%;
    }

    .topbar {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr) 380px;
      gap: 14px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(21,21,21,.96);
      z-index: 5;
    }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      color: #151515;
      background: var(--gold);
      font-family: var(--mono);
      font-weight: 900;
    }

    .brand h1 { margin: 0; font-size: 15px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand p { margin: 2px 0 0; color: var(--muted); font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .tabs { display: flex; gap: 7px; align-items: center; overflow-x: auto; padding-bottom: 1px; }
    .tab {
      flex: 0 0 auto;
      height: 34px;
      padding: 0 11px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #202020;
      font-size: 12px;
      font-weight: 800;
    }
    .tab:hover, .tab.active { color: var(--text); border-color: rgba(216,173,104,.58); background: #312b22; }

    .tools { display: flex; justify-content: flex-end; align-items: center; gap: 7px; min-width: 0; }
    .search {
      width: 170px;
      height: 34px;
      padding: 0 10px;
      color: var(--text);
      border: 1px solid var(--line);
      background: #202020;
      outline: none;
      font-size: 12px;
    }
    .tool-btn {
      height: 34px;
      padding: 0 10px;
      border: 1px solid var(--line);
      color: var(--muted);
      background: #202020;
      font-size: 12px;
      font-weight: 800;
    }
    .tool-btn:hover { color: var(--text); border-color: rgba(216,173,104,.58); }

    .workspace {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr) 420px;
      min-height: 0;
    }

    .left-panel, .detail-panel {
      min-height: 0;
      overflow: auto;
      background: rgba(24,24,24,.96);
    }
    .left-panel { border-right: 1px solid var(--line); }
    .detail-panel { border-left: 1px solid var(--line); }

    .panel-block { padding: 14px; border-bottom: 1px solid var(--line); }
    .panel-block h2 { margin: 0 0 9px; color: var(--gold); font-size: 13px; }
    .panel-block p { margin: 0; color: var(--muted); font-size: 12px; line-height: 1.55; }

    .legend { display: grid; gap: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .dot { width: 10px; height: 10px; display: inline-block; background: var(--node); border: 1px solid #555; }
    .dot.menu { background: #473a24; border-color: var(--gold); }
    .dot.flow { background: #213a34; border-color: var(--green); }
    .dot.model { background: #24304a; border-color: var(--blue); }
    .dot.data { background: #30303d; border-color: #7777aa; }
    .dot.risk { background: #422828; border-color: var(--red); }

    .quick-list { display: grid; gap: 6px; }
    .quick-link {
      width: 100%;
      min-height: 32px;
      padding: 7px 9px;
      border: 1px solid transparent;
      color: var(--muted);
      background: transparent;
      text-align: left;
      font-size: 12px;
    }
    .quick-link:hover { color: var(--text); border-color: var(--line); background: #202020; }

    .canvas-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
      overflow: auto;
      background:
        radial-gradient(circle at 48% 24%, rgba(216,173,104,.08), transparent 28%),
        rgba(18,18,18,.96);
    }

    .canvas {
      position: relative;
      width: 2900px;
      height: 1700px;
      transform-origin: 0 0;
      transition: transform .16s ease;
    }
    .links { position: absolute; inset: 0; width: 2900px; height: 1700px; pointer-events: none; overflow: visible; }
    .link-path { fill: none; stroke: #4b4b4b; stroke-width: 1.3; }
    .link-path.hot { stroke: rgba(216,173,104,.9); stroke-width: 1.9; }

    .node-card {
      position: absolute;
      width: 165px;
      min-height: 42px;
      display: grid;
      align-content: center;
      padding: 8px 10px;
      border: 1px solid #4a4a4a;
      color: var(--text);
      background: var(--node);
      box-shadow: 0 8px 22px rgba(0,0,0,.22);
      user-select: none;
      transition: border-color .15s ease, background .15s ease, transform .15s ease, opacity .15s ease;
    }
    .node-card:hover { transform: translateY(-1px); border-color: rgba(216,173,104,.65); background: #3f3a32; }
    .node-card.active { border-color: var(--gold); background: var(--node-active); box-shadow: 0 0 0 2px rgba(216,173,104,.13), 0 14px 28px rgba(0,0,0,.3); }
    .node-card.match { border-color: var(--green); box-shadow: 0 0 0 2px rgba(114,201,170,.18); }
    .node-card .name { display: block; overflow: hidden; color: var(--text); font-size: 11px; font-weight: 900; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }
    .node-card .meta { display: block; margin-top: 3px; overflow: hidden; color: var(--muted); font-size: 10px; line-height: 1.2; text-overflow: ellipsis; white-space: nowrap; }
    .node-card.type-root { width: 190px; background: #4a3720; border-color: var(--gold); }
    .node-card.type-menu { background: #3b3328; border-color: #69583e; }
    .node-card.type-flow { background: #263934; border-color: #466d60; }
    .node-card.type-model { background: #293248; border-color: #485b86; }
    .node-card.type-data { background: #30303d; border-color: #595977; }
    .node-card.type-risk { background: #3e2828; border-color: #754545; }

    .toggle {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: 1px solid #5f5f5f;
      color: var(--text);
      background: #222;
      font-size: 12px;
      font-family: var(--mono);
      line-height: 1;
    }
    .node-card.collapsed .toggle { color: #151515; background: var(--gold); border-color: var(--gold); }

    .detail-head { padding: 16px; border-bottom: 1px solid var(--line); background: #1b1b1b; }
    .detail-type { display: inline-flex; margin-bottom: 9px; padding: 3px 7px; color: var(--gold); border: 1px solid rgba(216,173,104,.42); background: rgba(216,173,104,.07); font-size: 11px; font-weight: 900; }
    .detail-title { margin: 0; font-size: 20px; line-height: 1.28; }
    .detail-summary { margin: 9px 0 0; color: var(--muted); font-size: 13px; line-height: 1.55; }
    .mini-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .mini-actions button { min-height: 30px; padding: 0 9px; color: var(--muted); border: 1px solid var(--line); background: #202020; font-size: 12px; font-weight: 800; }
    .mini-actions button:hover { color: var(--text); border-color: var(--gold); }

    .detail-body { padding: 16px; }
    .info-grid { display: grid; gap: 10px; }
    .info-card { padding: 12px; border: 1px solid var(--line); background: #202020; }
    .info-card h3 { margin: 0 0 7px; color: var(--gold); font-size: 12px; }
    .info-card ul, .info-card ol { margin: 0; padding-left: 18px; color: #d8d8d8; font-size: 12px; line-height: 1.62; }
    .info-card li + li { margin-top: 4px; }
    .detail-kv { display: grid; grid-template-columns: 92px minmax(0,1fr); gap: 8px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.06); color: #d8d8d8; font-size: 12px; line-height: 1.52; }
    .detail-kv b { color: var(--gold); font-weight: 900; }
    .code { margin: 0; padding: 11px; overflow: auto; color: #e6dfd0; border: 1px solid var(--line); background: #101010; font-family: var(--mono); font-size: 11px; line-height: 1.52; }
    .empty { padding: 18px; color: var(--muted); font-size: 13px; line-height: 1.6; }

    @media (max-width: 1180px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .topbar { grid-template-columns: 1fr; }
      .tools { justify-content: flex-start; flex-wrap: wrap; }
      .workspace { grid-template-columns: 1fr; }
      .left-panel, .detail-panel { max-height: none; border: 0; border-bottom: 1px solid var(--line); }
      .canvas-wrap { height: 720px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">MAP</div>
        <div>
          <h1>AI 视频生产工具菜单架构图</h1>
          <p>菜单树 · 工作台流程 · 创作规则 / 模型穿插 · 详细节点说明</p>
        </div>
      </div>
      <div class="tabs" id="tabs"></div>
      <div class="tools">
        <input id="search" class="search" placeholder="搜索菜单 / 功能 / 数据" />
        <button class="tool-btn" id="expandAll">全部展开</button>
        <button class="tool-btn" id="collapseAll">收起细节</button>
        <button class="tool-btn" id="zoomOut">-</button>
        <button class="tool-btn" id="zoomReset">100%</button>
        <button class="tool-btn" id="zoomIn">+</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="left-panel">
        <div class="panel-block">
          <h2>使用方式</h2>
          <p>先看“产品菜单”。点击任何节点，右侧会显示它能做什么、页面控件、操作步骤、读写数据、后端接口、创作规则和模型关系。</p>
        </div>
        <div class="panel-block">
          <h2>节点类型</h2>
          <div class="legend">
            <div class="legend-item"><span class="dot menu"></span>菜单 / 页面</div>
            <div class="legend-item"><span class="dot flow"></span>流程 / 工作台</div>
            <div class="legend-item"><span class="dot model"></span>模型 / Workflow</div>
            <div class="legend-item"><span class="dot data"></span>数据 / 服务</div>
            <div class="legend-item"><span class="dot risk"></span>边界 / 风险</div>
          </div>
        </div>
        <div class="panel-block">
          <h2>快速定位</h2>
          <div class="quick-list" id="quickList"></div>
        </div>
      </aside>

      <main class="canvas-wrap" id="canvasWrap">
        <div class="canvas" id="canvas">
          <svg class="links" id="links"></svg>
          <div id="nodes"></div>
        </div>
      </main>

      <aside class="detail-panel" id="detailPanel">
        <div class="empty">点击任意节点查看详情。</div>
      </aside>
    </div>
  </div>

  <script>
    // DATA_START
    const views = {
      menu: {
        label: '产品菜单',
        root: {
          id: 'menu-root',
          name: 'AI 视频生产工具',
          meta: '用户看到的软件菜单',
          type: 'root',
          summary: '这张图先从用户能看到的菜单开始，而不是从技术模块开始。每个菜单节点都说明能做什么、页面控件、数据、接口，以及创作规则 / 模型 / 任务系统插在哪里。',
          actions: ['创建和管理 AI 短视频作品', '管理视频包、创作规则、模型工作流和系统参数', '在作品工作台内完成内容创作、分镜、生图、视频、合成、导出', '在作品内查看进度、失败原因和历史记录'],
          children: [
            {
              id: 'menu-home',
              name: '我的作品',
              meta: '默认入口 / 作品管理',
              type: 'menu',
              summary: '用户打开软件后的默认入口。这里是作品管理页：看作品、筛选作品、开始创作、打开作品、继续未完成作品。失败和导出只作为作品状态或作品卡片操作展示，不单独做一级入口。',
              actions: ['查看作品列表', '按状态筛选作品', '搜索作品', '开始创作', '打开作品工作台', '继续生成中或失败的作品', '归档或删除作品'],
              controls: ['作品搜索框', '状态筛选 Tabs', '排序选择器', '开始创作按钮', '作品卡片', '卡片更多操作菜单'],
              outputs: ['作品列表（技术 ProjectList）', '作品状态汇总（技术 ProjectStatusSummary）'],
              frontend: ['WorksHomePage / ProjectHomePage', 'WorksList / ProjectList', 'WorkCard / ProjectCard', 'ProjectFilterTabs'],
              backend: ['list_projects', 'create_project', 'archive_project', 'delete_project', 'open_output_dir'],
              data: ['Project.project_lifecycle', 'Project.updated_at', 'Task.task_status', 'TaskResult.final_video_path'],
              children: [
                {
                  id: 'home-project-list',
                  name: '作品列表',
                  meta: '全部 / 草稿 / 生成中 / 已完成 / 失败',
                  type: 'menu',
                  summary: '首页主体就是作品列表。失败作品和已导出作品都只是列表里的状态，不是单独入口。',
                  actions: ['查看全部作品', '查看草稿作品', '查看生成中作品', '查看已完成作品', '查看失败作品'],
                  controls: ['状态 Tabs', '作品卡片', '空状态提示'],
                  commands: ['list_projects'],
                  data: ['Project', 'Task.task_status', 'Project.project_lifecycle'],
                  notes: ['失败状态显示在作品卡片上，点击作品后进入对应步骤处理', '已完成作品在卡片上显示导出状态和打开目录操作']
                },
                {
                  id: 'home-search-filter',
                  name: '搜索 / 筛选 / 排序',
                  meta: '作品管理能力',
                  type: 'menu',
                  summary: '作品多了以后必须能快速找到作品。它是首页的基础管理能力，不是单独业务模块。',
                  actions: ['按标题搜索', '按状态筛选', '按更新时间排序', '按创建时间排序', '按视频包筛选'],
                  controls: ['搜索框', '状态筛选 Tabs', '排序下拉', '内容类型筛选'],
                  commands: ['list_projects'],
                  fields: {
                    keyword: '作品标题、视频想法或文案关键词',
                    lifecycle: 'draft / running / completed / failed / archived',
                    sortBy: 'updated_at / created_at / title',
                    inputType: 'topic / paste / article / novel / material'
                  }
                },
                {
                  id: 'home-create',
                  name: '开始创作',
                  meta: '创建作品草稿并进入工作台',
                  type: 'menu',
                  summary: '用户点击“开始创作”后，系统创建一个作品草稿并直接进入作品工作台的“内容创作”步骤。用户不需要先理解或填写一个空项目壳。技术上仍创建 Project，但用户侧叫作品。',
                  actions: ['点击开始创作', '创建作品草稿', '进入作品工作台', '在内容创作步骤填写视频想法或导入文案', '选择视频包和基础规格'],
                  controls: ['开始创作按钮', '作品草稿创建中状态', '进入作品工作台'],
                  steps: ['在我的作品点击开始创作', '系统创建 ProjectDraft 和默认 Bible', '进入作品工作台的内容创作步骤', '用户在内容创作里选择视频包、画幅、时长、分镜数，并输入或整理文案'],
                  outputs: ['作品草稿（技术 Project）', '默认 Project Bible', 'ProductionPackBinding'],
                  frontend: ['WorksHomePage', 'ProjectWorkspace', 'ContentCreationStep', 'PackSelector', 'WorkBasicSettings'],
                  backend: ['create_project', 'list_production_packs', 'get_workflow_defaults'],
                  data: ['Project.workflow_type', 'Project.lifecycle', 'ProductionPackBinding'],
                  fields: {
                    workTitle: '作品标题，先自动生成，用户后面可手动修改',
                    workflowType: 'image_to_video 当前主线；后续 material_edit、digital_human、image_slideshow',
                    packId: '在内容创作步骤选择视频包，不等于模型',
                    aspectRatio: '在内容创作步骤设置，可后续修改',
                    targetSceneCount: '在内容创作步骤设置，影响分镜规则',
                    segmentDurationSeconds: '在内容创作步骤设置，每段默认视频时长'

                  children: [
                    { id: 'create-draft', name: '作品草稿', meta: '自动创建', type: 'menu', summary: '点击开始创作后立即创建作品草稿。技术上是 Project，用户侧显示为作品。', data: ['Project.project_id', 'Project.lifecycle'] },
                    { id: 'create-enter-workspace', name: '进入作品工作台', meta: '内容创作第一步', type: 'flow', summary: '创建草稿后直接进入作品工作台的内容创作步骤，不让用户停在空项目表单。', data: ['ProjectWorkspace', 'ContentCreationStep'] },
                    { id: 'create-later-settings', name: '创作基础设置', meta: '在工作台内设置', type: 'flow', summary: '视频包、画幅、目标时长、分镜数放在内容创作步骤的侧栏里，可随着内容理解随时调整。', data: ['ProductionPackBinding', 'aspect_ratio', 'target_duration_seconds', 'target_scene_count'] }

                },
                {
                  id: 'home-card-actions',
                  name: '作品卡片操作',
                  meta: '打开 / 继续 / 复制 / 归档',
                  type: 'menu',
                  summary: '首页里的操作应该围绕作品本身。失败、导出、继续生成都作为作品卡片上的动作出现。',
                  actions: ['打开作品', '继续生成', '查看错误', '复制作品', '归档作品', '删除作品', '打开输出目录'],
                  controls: ['打开按钮', '继续按钮', '更多菜单', '状态标签', '输出目录按钮'],
                  commands: ['open_project', 'retry_task_step', 'duplicate_project', 'archive_project', 'delete_project', 'open_output_dir'],
                  data: ['Project（作品）', 'Task', 'TaskStep', 'TaskResult'],
                  notes: ['只有作品存在 final_video_path 时才显示打开输出目录', '只有失败作品才显示查看错误或继续重试'],
                  children: [
                    {
                      id: 'project-workspace',
                      name: '作品工作台',
                      meta: '打开作品后的内部页面',
                      type: 'flow',
                      summary: '作品工作台不是一级菜单，只能从作品列表、作品卡片、开始创作或任务跳转进入。它是某个具体作品内部的完整生产页面。',
                      actions: ['内容创作', '生成和编辑分镜', '维护设定集', '生成并选择图片', '规划视频模型输入', '生成并选择视频片段', '合成导出'],
                      controls: ['StepBar', '左侧步骤导航', '主表格工作区', '右侧详情抽屉', '任务进度条', '重试按钮'],
                      outputs: ['StoryboardItem[]', 'Bibles', 'ImageCandidate[]', 'VideoSegment[]', 'final.mp4'],
                      frontend: ['ProjectWorkspace / WorkWorkspace', 'StepNavigator', 'TaskProgress', 'RightDetailDrawer'],
                      backend: ['get_project_workspace', 'start_pipeline_step', 'retry_task_step'],
                      data: ['Project', 'Storyboard', 'StoryboardItem', 'Task', 'TaskStep'],
                      children: [
                        {
                          id: 'workspace-content',
                          name: '内容创作',
                          meta: '作品第一步',

          name: '数据结构与后端支撑',
          meta: 'Project -> Artifact -> Task',
          type: 'root',
          summary: '这一张图给开发看，说明菜单和流程背后的数据怎么流动。',
          children: [
            { id: 'data-project', name: 'Project', meta: '作品容器（技术名 Project）', type: 'data', summary: '用户侧一次创作叫一个作品，技术侧落库为 Project。记录 workflowType、inputType、sourceText、画幅、时长、生命周期。', data: ['project_id', 'workflow_type', 'input_type', 'source_text', 'aspect_ratio'] },
            { id: 'data-bible', name: 'Bibles', meta: '一致性来源', type: 'data', summary: 'Style / Character / Environment / Prop Bible。分镜只引用 ID，不复制整份设定。', data: ['StyleBible', 'CharacterBible', 'EnvironmentBible'] },
            { id: 'data-storyboard', name: 'StoryboardItem', meta: '最小工作单元', type: 'data', summary: '每个分镜行贯穿提示词、生图、视频和合成。', data: ['source_text', 'visual_description', 'image_prompt', 'video_prompt', 'selected_image_id', 'selected_video_segment_id'] },
            { id: 'data-image', name: 'ImageCandidate', meta: '候选图', type: 'data', summary: '每个分镜多张候选图，同一 item 只能选中一张。重生成不删除旧候选。' },
            { id: 'data-video', name: 'VideoSegment', meta: '视频片段', type: 'data', summary: '每个分镜可生成多个视频片段，确认一个进入合成。' },
            { id: 'data-task', name: 'Task / TaskStep', meta: '执行记录', type: 'data', summary: '任务记录状态、进度、输入输出、错误和快照。' },
            { id: 'data-provider', name: '模型 / 工作流配置', meta: 'Provider / Workflow', type: 'model', summary: 'API 模型写 provider_models，ComfyUI / RunningHub 写 workflow_presets。' },
            {
              id: 'data-project-files',
              name: '作品文件 / 作品目录',
              meta: '作品产物归属',
              type: 'data',
              summary: '每个作品都应该有一个受控作品目录。当前作品生产过程中产生的候选图、视频片段、封面、字幕、导出文件、日志和快照都默认放在作品目录，不默认进入素材库。技术路径可继续使用 workspace/projects/{projectId}/。',
              actions: ['保存作品输入文件', '保存分镜候选图', '保存视频片段', '保存封面和字幕', '保存 final.mp4', '保存日志和任务快照'],
              data: ['workspace/projects/proj_xxx/', 'project.json', 'images/', 'videos/', 'exports/', 'logs/', 'snapshots/'],
              fields: {
                projectDir: 'workspace/projects/{projectId}/',
                images: '作品内 AI 生图候选图和分镜图',
                videos: '作品内 AI 视频片段',
                exports: 'final.mp4、作品导出包',
                snapshots: '任务快照、模型快照、创作规则快照',
                promotionRule: '只有用户主动保存为可复用资产，才复制或登记到素材库'
              },
              notes: ['作品产物默认属于作品文件夹', '素材库只放可复用资产', '数据库记录相对路径，不记录任意绝对路径']
            },
            { id: 'data-storage', name: 'Storage / PathGuard', meta: '文件安全', type: 'risk', summary: '所有媒体文件存工作区相对路径，远程 URL 必须下载转存。StorageService 负责写入作品目录或素材库目录，PathGuard 负责防止越界路径。' }
          ]
        }
      }
    };
    // DATA_END

    const state = {
      viewKey: 'menu',
      collapsed: new Set(),
      selectedId: 'menu-root',
      zoom: 1,
      nodeMap: new Map(),
      visibleNodes: [],
      visibleLinks: []
    };

    const tabsEl = document.getElementById('tabs');
    const nodesEl = document.getElementById('nodes');
    const linksEl = document.getElementById('links');
    const detailEl = document.getElementById('detailPanel');
    const quickListEl = document.getElementById('quickList');
    const canvas = document.getElementById('canvas');
    const canvasWrap = document.getElementById('canvasWrap');
    const searchEl = document.getElementById('search');

    function initTabs() {
      tabsEl.innerHTML = '';
      Object.entries(views).forEach(([key, view]) => {
        const btn = document.createElement('button');
        btn.className = `tab ${key === state.viewKey ? 'active' : ''}`;
        btn.textContent = view.label;
        btn.onclick = () => {
          state.viewKey = key;
          state.selectedId = views[key].root.id;
          state.collapsed.clear();
          searchEl.value = '';
          render();
        };
        tabsEl.appendChild(btn);
      });
    }

    function flatten(node, depth = 0, parent = null, list = []) {
      state.nodeMap.set(node.id, { ...node, depth, parent });
      list.push({ ...node, depth, parent });
      (node.children || []).forEach(child => flatten(child, depth + 1, node.id, list));
      return list;
    }

    function collectVisible(node, depth = 0, parent = null, rows = new Map(), links = []) {
      if (!rows.has(depth)) rows.set(depth, []);
      rows.get(depth).push({ ...node, depth, parent });
      if (!state.collapsed.has(node.id)) {
        (node.children || []).forEach(child => {
          links.push({ from: node.id, to: child.id });
          collectVisible(child, depth + 1, node.id, rows, links);
        });
      }
      return { rows, links };
    }

    function layoutTree() {
      const root = views[state.viewKey].root;
      state.nodeMap.clear();
      flatten(root);
      const { rows, links } = collectVisible(root);
      const positioned = [];
      const colWidth = 265;
      const rowHeight = 78;
      const topPadding = 55;
      const leftPadding = 55;
      [...rows.entries()].forEach(([depth, row]) => {
        const count = row.length;
        const startY = topPadding + Math.max(0, (13 - count)) * 18;
        row.forEach((node, index) => {
          positioned.push({ ...node, x: leftPadding + depth * colWidth, y: startY + index * rowHeight });
        });
      });
      state.visibleNodes = positioned;
      state.visibleLinks = links;
    }

    function drawLinks() {
      const byId = new Map(state.visibleNodes.map(n => [n.id, n]));
      linksEl.innerHTML = '';
      state.visibleLinks.forEach(link => {
        const from = byId.get(link.from);
        const to = byId.get(link.to);
        if (!from || !to) return;
        const x1 = from.x + 165;
        const y1 = from.y + 22;
        const x2 = to.x;
        const y2 = to.y + 22;
        const mid = x1 + Math.max(38, (x2 - x1) * .52);
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${x1} ${y1} C ${mid} ${y1}, ${mid} ${y2}, ${x2} ${y2}`);
        path.setAttribute('class', `link-path ${link.from === state.selectedId || link.to === state.selectedId ? 'hot' : ''}`);
        linksEl.appendChild(path);
      });
    }

    function drawNodes() {
      const query = searchEl.value.trim().toLowerCase();
      nodesEl.innerHTML = '';
      state.visibleNodes.forEach(node => {
        const el = document.createElement('div');
        const hasChildren = (node.children || []).length > 0;
        const isCollapsed = state.collapsed.has(node.id);
        const isMatch = query && JSON.stringify(node).toLowerCase().includes(query);
        el.className = `node-card type-${node.type || 'data'} ${state.selectedId === node.id ? 'active' : ''} ${isCollapsed ? 'collapsed' : ''} ${isMatch ? 'match' : ''}`;
        el.style.left = `${node.x}px`;
        el.style.top = `${node.y}px`;
        el.innerHTML = `<span class="name">${escapeHtml(node.name)}</span><span class="meta">${escapeHtml(node.meta || '')}</span>`;
        el.onclick = () => {
          state.selectedId = node.id;
          renderDetail();
          drawNodes();
          drawLinks();
        };
        if (hasChildren) {
          const toggle = document.createElement('button');
          toggle.className = 'toggle';
          toggle.textContent = isCollapsed ? '+' : '-';
          toggle.onclick = event => {
            event.stopPropagation();
            if (state.collapsed.has(node.id)) state.collapsed.delete(node.id);
            else state.collapsed.add(node.id);
            renderMapOnly();
          };
          el.appendChild(toggle);
        }
        nodesEl.appendChild(el);
      });
    }

    function renderDetail() {
      const node = state.nodeMap.get(state.selectedId);
      if (!node) {
        detailEl.innerHTML = '<div class="empty">点击任意节点查看详情。</div>';
        return;
      }
      const blocks = [
        ['职责', node.summary ? [node.summary] : []],
        ['能做什么', node.actions],
        ['页面控件', node.controls],
        ['操作步骤', node.steps],
        ['输入', node.inputs],
        ['输出', node.outputs],
        ['前端交互', node.frontend],
        ['后端服务', node.backend],
        ['关键数据', node.data],
        ['关联创作规则', node.skills],
        ['关联模型 / 工作流', node.models],
        ['接口 / Command', node.commands],
        ['注意事项', node.notes]
      ].filter(([, items]) => items && items.length);

      detailEl.innerHTML = `
        <div class="detail-head">
          <span class="detail-type">${escapeHtml(typeLabel(node.type))}</span>
          <h2 class="detail-title">${escapeHtml(node.name)}</h2>
          <p class="detail-summary">${escapeHtml(node.meta || '')}</p>
          <div class="mini-actions">
            <button id="focusNode">定位节点</button>
            ${(node.children || []).length ? '<button id="toggleNode">展开/收起</button>' : ''}
          </div>
        </div>
        <div class="detail-body">
          <div class="info-grid">
            ${blocks.map(([title, items]) => `
              <div class="info-card">
                <h3>${escapeHtml(title)}</h3>
                ${title === '操作步骤'
                  ? `<ol>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ol>`
                  : `<ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`}
              </div>
            `).join('')}
            ${node.fields ? `
              <div class="info-card">
                <h3>字段 / 配置项</h3>
                ${Object.entries(node.fields).map(([key, value]) => `
                  <div class="detail-kv"><b>${escapeHtml(key)}</b><span>${escapeHtml(value)}</span></div>
                `).join('')}
              </div>
            ` : ''}
            ${node.example ? `<pre class="code">${escapeHtml(node.example)}</pre>` : ''}
          </div>
        </div>`;

      document.getElementById('focusNode').onclick = focusSelected;
      const toggleBtn = document.getElementById('toggleNode');
      if (toggleBtn) {
        toggleBtn.onclick = () => {
          if (state.collapsed.has(node.id)) state.collapsed.delete(node.id);
          else state.collapsed.add(node.id);
          renderMapOnly();
        };
      }
    }

    function renderQuickList() {
      const root = views[state.viewKey].root;
      const all = flatten(root, 0, null, []);
      const important = all.filter(n => n.depth <= 1 || ['作品工作台', '内容创作', '创作资源', '视频包', '创作规则', '模型 / 工作流', 'AI 生图', 'AI 视频', '生图输入规划', '视频输入规划', 'ComfyUI / RunningHub', '系统设置'].includes(n.name)).slice(0, 18);
      quickListEl.innerHTML = '';
      important.forEach(node => {
        const btn = document.createElement('button');
        btn.className = 'quick-link';
        btn.textContent = node.name;
        btn.onclick = () => {
          expandAncestors(node.id);
          state.selectedId = node.id;
          renderMapOnly();
          renderDetail();
          focusSelected();
        };
        quickListEl.appendChild(btn);
      });
    }

    function expandAncestors(id) {
      let node = state.nodeMap.get(id);
      while (node && node.parent) {
        state.collapsed.delete(node.parent);
        node = state.nodeMap.get(node.parent);
      }
    }

    function focusSelected() {
      const node = state.visibleNodes.find(n => n.id === state.selectedId);
      if (!node) return;
      canvasWrap.scrollTo({
        left: Math.max(0, node.x * state.zoom - canvasWrap.clientWidth / 2 + 120),
        top: Math.max(0, node.y * state.zoom - canvasWrap.clientHeight / 2 + 80),
        behavior: 'smooth'
      });
    }

    function renderMapOnly() {
      layoutTree();
      drawLinks();
      drawNodes();
      canvas.style.transform = `scale(${state.zoom})`;
      document.getElementById('zoomReset').textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function render() {
      initTabs();
      renderQuickList();
      renderMapOnly();
      renderDetail();
      setTimeout(focusSelected, 60);
    }

    function setZoom(next) {
      state.zoom = Math.max(.55, Math.min(1.45, next));
      renderMapOnly();
    }

    function typeLabel(type) {
      return {
        root: '根节点',
        menu: '菜单 / 页面',
        flow: '流程 / 工作台',
        model: '模型 / Workflow',
        data: '数据 / 服务',
        risk: '边界 / 风险'
      }[type] || '节点';
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    document.getElementById('expandAll').onclick = () => { state.collapsed.clear(); renderMapOnly(); };
    document.getElementById('collapseAll').onclick = () => {
      state.collapsed.clear();
      flatten(views[state.viewKey].root, 0, null, []).forEach(node => {
        if (node.depth >= 1 && (node.children || []).length) state.collapsed.add(node.id);
      });
      renderMapOnly();
    };
    document.getElementById('zoomIn').onclick = () => setZoom(state.zoom + .1);
    document.getElementById('zoomOut').onclick = () => setZoom(state.zoom - .1);
    document.getElementById('zoomReset').onclick = () => setZoom(1);
    searchEl.oninput = () => {
      const query = searchEl.value.trim().toLowerCase();
      if (query) {
        const found = [...state.nodeMap.values()].find(node => JSON.stringify(node).toLowerCase().includes(query));
        if (found) {
          expandAncestors(found.id);
          state.selectedId = found.id;
        }
      }
      renderMapOnly();
      renderDetail();
      if (query) setTimeout(focusSelected, 40);
    };

    if (Object.keys(views).length) render();
  </script>
</body>
</html>
